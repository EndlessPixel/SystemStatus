<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f7f7;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 30px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        hr {
            width: 800px;
            border: none;
            height: 1px;
            background: #ccc;
            margin: 0 auto 20px;
        }

        .back-home {
            margin-top: 30px;
        }

        .back-home a {
            display: inline-block;
            padding: 12px 24px;
            background: #5865f2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .back-home a:hover {
            background: #4752c4;
        }
    </style>
</head>

<body>
    <h1 class="title">404 Not Found</h1>
    <hr>
    <div class="back-home">
        <a href="/">Back to Home Page </a>
    </div>
</body>

</html>
